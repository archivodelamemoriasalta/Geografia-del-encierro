<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geografías del Encierro</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Tu CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Estilos inline (mantengo los que ya tenías) -->
    <style>
        :root {
            --bg-body: #0f0f0f;
            --bg-panel: #1a1a1a;
            --bg-bar: #111111;
            --accent-red: #d32f2f;
            --accent-red-hover: #ff5252;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --border: #333333;
        }

        body { margin:0; font-family:'Inter',sans-serif; background:var(--bg-body); color:var(--text-primary); overflow:hidden; line-height:1.6; }

        #barra-superior {
            position:absolute; top:0; width:100%; background:rgba(17,17,17,0.95); backdrop-filter:blur(12px);
            padding:12px 20px; z-index:1000; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);
        }
        .header-izq { display:flex; align-items:center; gap:16px; }
        .titulo-header { display:flex; flex-direction:column; }
        .linea-superior, .linea-inferior { font-size:11px; color:var(--text-secondary); letter-spacing:1.2px; text-transform:uppercase; }
        .linea-principal { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:#fff; }

        #menu-info {
            background:#222; border:1px solid #444; color:white; padding:10px 16px; border-radius:6px;
            cursor:pointer; font-weight:500; transition:all 0.3s;
        }
        #menu-info:hover { background:var(--accent-red); border-color:var(--accent-red); }

        #panel-izquierdo {
            position:absolute; top:0; left:-320px; width:320px; height:100%; background:var(--bg-panel);
            box-shadow:4px 0 30px rgba(0,0,0,0.8); z-index:999; transition:left 0.4s ease; overflow-y:auto;
        }
        #panel-lateral {
            position:absolute; top:0; right:-360px; width:360px; height:100%; background:var(--bg-panel);
            box-shadow:-4px 0 30px rgba(0,0,0,0.8); z-index:999; transition:right 0.4s ease; overflow-y:auto;
        }

        .panel-header {
            background:#111; padding:16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);
        }
        .panel-header h2 { font-family:'Playfair Display',serif; font-size:18px; margin:0; color:#fff; }

        #map { height:100vh; width:100%; z-index:1; }

        #barra-inferior {
            position:absolute; bottom:0; width:100%; background:rgba(15,15,15,0.95); color:#777; font-size:11.5px;
            text-align:center; padding:8px 0; border-top:1px solid var(--border); z-index:1000;
        }

        @media (max-width:768px) {
            #panel-izquierdo, #panel-lateral { width:90%; }
        }
    </style>
</head>
<body>

    <!-- BARRA SUPERIOR -->
    <div id="barra-superior">
        <div class="header-izq">
            <button id="menu-info">MENÚ</button>
            <img src="logo.PNG" class="logo-header" alt="Logo Archivo Provincial de la Memoria" style="height:52px;">
            <div class="titulo-header">
                <div class="linea-superior">ARCHIVO PROVINCIAL DE LA MEMORIA</div>
                <div class="linea-principal">GEOGRAFÍAS DEL ENCIERRO (1974 - 1983)</div>
                <div class="linea-inferior">FONDO DOCUMENTAL PRESOS POLÍTICOS</div>
            </div>
        </div>
    </div>

    <!-- PANEL IZQUIERDO (menú) -->
    <aside id="panel-izquierdo">
        <div class="panel-header">
            <h2>MENÚ</h2>
            <button id="cerrar-menu-izq">X</button>
        </div>
        <div style="padding:20px;">
            <!-- ← Aquí pega tu texto original completo (Quiénes somos, Equipo, etc.) -->
            <!-- El que tenías antes funciona perfecto. Solo déjalo tal cual. -->
            <details open><summary>Quiénes somos</summary><p>El Archivo Provincial de la Memoria es creado por el decreto 1741...</p></details>
            <!-- ... resto de tus <details> ... -->
        </div>
    </aside>

    <!-- PANEL DERECHO (info departamentos/personas) -->
    <aside id="panel-lateral">
        <div class="panel-header">
            <h2 id="titulo-panel">Departamento</h2>
            <button id="cerrar-panel">X</button>
        </div>
        <div id="contenido-panel" style="padding:20px;"></div>
    </aside>

    <!-- MAPA -->
    <div id="map"></div>

    <!-- BARRA INFERIOR -->
    <div id="barra-inferior">
        Archivo Provincial de la Memoria de Salta • 2025
    </div>

    <!-- Leaflet JS + tu script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
